---
layout: default
title: Chart Generator
description: No-BS Free Chart generator via Chart.js, a JavaScript library for creating charts.
keywords: chart, generator, Chart.js, JavaScript, utility
custom_scripts: |
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const chartType = document.getElementById("chartType");
    const chartLabels = document.getElementById("chartLabels");
    const chartValues = document.getElementById("chartValues");
    const generateChart = document.getElementById("generateChart");
    const chartCanvas = document.getElementById("chartCanvas");
    const downloadChart = document.getElementById("downloadChart");

    let currentChart = null;

    function createChart() {
      const labels = chartLabels.value
        .split(",")
        .map((label) => label.trim())
        .filter((label) => label !== "");

      const values = chartValues.value
        .split(",")
        .map((value) => Number(value.trim()));

      if (labels.length === 0 || values.length === 0) {
        alert("Insert at least one label and one value.");
        return;
      }

      if (labels.length !== values.length) {
        alert("The number of labels must match the number of values.");
        return;
      }

      if (values.some((value) => Number.isNaN(value))) {
        alert("Values must be numbers.");
        return;
      }

      if (currentChart !== null) {
        currentChart.destroy();
      }

      currentChart = new Chart(chartCanvas, {
        type: chartType.value,
        data: {
          labels: labels,
          datasets: [
            {
              label: "Values",
              data: values,
            },
          ],
        },
        options: {
          responsive: true,
          animation: true,
          plugins: {
            legend: {
              display: chartType.value === "pie",
            },
          },
          scales:
            chartType.value === "bar"
              ? {
                  y: {
                    beginAtZero: true,
                  },
                }
              : {},
        },
      });

      downloadChart.href = chartCanvas.toDataURL("image/png");
      downloadChart.classList.remove("d-none");
    }

    generateChart.addEventListener("click", createChart);

    downloadChart.addEventListener("click", () => {
      downloadChart.href = chartCanvas.toDataURL("image/png");
    });

    chartLabels.addEventListener("keydown", (event) => {
      if (event.key === "Enter") createChart();
    });

    chartValues.addEventListener("keydown", (event) => {
      if (event.key === "Enter") createChart();
    });

    createChart();
  </script>
---

<h1>Chart Generator</h1>
<p>Line, bar and pie chart generator via Chart.js</p>
<label for="chartType" class="form-label">Chart type</label>
<select id="chartType" class="form-select rounded-0 mb-3">
  <option value="bar">Bar chart</option>
  <option value="pie">Pie chart</option>
  <option value="line">Line chart</option>
</select>

<label for="chartLabels" class="form-label">Labels</label>
<input
  type="text"
  id="chartLabels"
  class="form-control rounded-0 mb-3"
  placeholder="Example: Apples, Bananas, Oranges"
  value="Apples, Bananas, Oranges"
/>

<label for="chartValues" class="form-label">Values</label>
<input
  type="text"
  id="chartValues"
  class="form-control rounded-0 mb-3"
  placeholder="Example: 10, 20, 15"
  value="10, 20, 15"
/>

<button id="generateChart" class="btn btn-success border rounded-0 mb-3">
  Generate Chart
</button>

<div class="bg-white border p-3">
  <canvas id="chartCanvas"></canvas>
</div>
<a
  id="downloadChart"
  class="btn btn-primary border rounded-0 mt-3 d-none"
  download="chart.png"
>
  Download PNG
</a>
