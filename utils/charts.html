  <body class="text-light" style="padding-top: 3.7rem">

      <div class="container-fluid">
        <a class="navbar-brand text-primary mcten" href="/">Oratot.com</a>
        <button

          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav">
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                General Utils
              </a>
              <ul
                class="dropdown-menu dropdown-menu-dark bg-dark rounded-0 border"
              >
                <li>
                  <a class="dropdown-item" href="/utils/qr.html"

            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container my-4">
      <div class="row">
        <div class="col-12 col-md-4">
          <div
            class="p-4 border bg-dark position-relative d-flex justify-content-center skin-viewer-box"
          >
            <canvas id="skin_container"></canvas>
            <a
              href="/assets/skin_definitiva.png"
              download="skin_definitiva.png"
              class="btn btn-md btn-dark border rounded-0 position-absolute top-0 start-0 m-2"
              aria-label="Download Minecraft skin"
            >
              ⬇
            </a>
            <button
              id="toggleSkinAnimation"
              class="btn btn-md btn-dark border rounded-0 position-absolute top-0 end-0 m-2"
              type="button"
              aria-label="Toggle animation"
            >
              ▶
            </button>
          </div>
        </div>

        <div class="col-12 col-md-8">
          <div class="p-4 border bg-dark">
            <h1 class="mcten">Chart Generator</h1>
            <p>Line, bar and pie chart generator via Chart.js</p>
            <label for="chartType" class="form-label">Chart type</label>
            <select id="chartType" class="form-select rounded-0 mb-3">
              <option value="bar">Bar chart</option>
              <option value="pie">Pie chart</option>
              <option value="line">Line chart</option>
            </select>

            <label for="chartLabels" class="form-label">Labels</label>
            <input
              type="text"
              id="chartLabels"
              class="form-control rounded-0 mb-3"
              placeholder="Example: Apples, Bananas, Oranges"
              value="Apples, Bananas, Oranges"
            />

            <label for="chartValues" class="form-label">Values</label>
            <input
              type="text"
              id="chartValues"
              class="form-control rounded-0 mb-3"
              placeholder="Example: 10, 20, 15"
              value="10, 20, 15"
            />

            <button
              id="generateChart"
              class="btn btn-success border rounded-0 mb-3"
            >
              Generate Chart
            </button>

            <div class="bg-white border p-3">
              <canvas id="chartCanvas"></canvas>
            </div>
            <a
              id="downloadChart"
              class="btn btn-primary border rounded-0 mt-3 d-none"
              download="chart.png"
            >
              Download PNG
            </a>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/js/skinview.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/background.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      const chartType = document.getElementById("chartType");
      const chartLabels = document.getElementById("chartLabels");
      const chartValues = document.getElementById("chartValues");
      const generateChart = document.getElementById("generateChart");
      const chartCanvas = document.getElementById("chartCanvas");
      const downloadChart = document.getElementById("downloadChart");

      let currentChart = null;

      function createChart() {
        const labels = chartLabels.value
          .split(",")
          .map((label) => label.trim())
          .filter((label) => label !== "");

        const values = chartValues.value
          .split(",")
          .map((value) => Number(value.trim()));

        if (labels.length === 0 || values.length === 0) {
          alert("Insert at least one label and one value.");
          return;
        }

        if (labels.length !== values.length) {
          alert("The number of labels must match the number of values.");
          return;
        }

        if (values.some((value) => Number.isNaN(value))) {
          alert("Values must be numbers.");
          return;
        }

        if (currentChart !== null) {
          currentChart.destroy();
        }

        currentChart = new Chart(chartCanvas, {
          type: chartType.value,
          data: {
            labels: labels,
            datasets: [
              {
                label: "Values",
                data: values,
              },
            ],
          },
          options: {
            responsive: true,
            animation: false,
            plugins: {
              legend: {
                display: chartType.value === "pie",
              },
            },
            scales:
              chartType.value === "bar"
                ? {
                    y: {
                      beginAtZero: true,
                    },
                  }
                : {},
          },
        });

        downloadChart.href = chartCanvas.toDataURL("image/png");
        downloadChart.classList.remove("d-none");
      }

      generateChart.addEventListener("click", createChart);

      downloadChart.addEventListener("click", () => {
        downloadChart.href = chartCanvas.toDataURL("image/png");
      });

      chartLabels.addEventListener("keydown", (event) => {
        if (event.key === "Enter") createChart();
      });

      chartValues.addEventListener("keydown", (event) => {
        if (event.key === "Enter") createChart();
      });

      createChart();
    </script>
  </body>
</html>
