    />
    <link

      href="/assets/favicon-96x96.png?v=hello world"

    <link

  </head>
  <body class="text-light" style="padding-top: 3.7rem">
    <nav
      class="navbar navbar-expand-md navbar-dark bg-dark fixed-top border-bottom"
    >
      <div class="container-fluid">
        <a class="navbar-brand text-primary mcten" href="/">Oratot.com</a>
        <button
          class="navbar-toggler rounded-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav">
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                General Utils
              </a>
              <ul
                class="dropdown-menu dropdown-menu-dark bg-dark rounded-0 border"
              >
                <li>
                  <a class="dropdown-item" href="/utils/qr.html"
                    >QR Code Generator</a
                  >
                </li>
                <li>
                  <a class="dropdown-item" href="/utils/charts.html"
                    >Chart Generator</a
                  >
                </li>
              </ul>
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Minecraft Utils
              </a>
              <ul
                class="dropdown-menu dropdown-menu-dark bg-dark rounded-0 border"
              >
                <li>
                  <a class="dropdown-item" href="/utils/nether.html"
                    >Nether Coordinates</a
                  >
                </li>
              </ul>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/socials.html">Socials</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container my-4">
      <div class="row">
        <div class="col-12 col-md-4">
          <div
            class="p-4 border bg-dark position-relative d-flex justify-content-center skin-viewer-box"
          >
            <canvas id="skin_container"></canvas>
            <a
              href="/assets/skin_definitiva.png"
              download="skin_definitiva.png"
              class="btn btn-md btn-dark border rounded-0 position-absolute top-0 start-0 m-2"
              aria-label="Download Minecraft skin"
            >
              ⬇
            </a>
            <button
              id="toggleSkinAnimation"
              class="btn btn-md btn-dark border rounded-0 position-absolute top-0 end-0 m-2"
              type="button"
              aria-label="Toggle animation"
            >
              ▶
            </button>
          </div>
        </div>

        <div class="col-12 col-md-8">
          <div class="p-4 border bg-dark">
            <h1 class="mcten">Nether Coordinate Calculator</h1>
            <p>
              Convert Minecraft Overworld coordinates to Nether coordinates and
              vice versa.
            </p>
            <div class="calculator">
              <label class="form-label">
                Mode:
                <select id="direction" class="form-select rounded-0">
                  <option value="overworld-to-nether">
                    Overworld to Nether
                  </option>
                  <option value="nether-to-overworld">
                    Nether to Overworld
                  </option>
                </select>
              </label>

              <div class="coord-row mb-3 mt-2">
                <label>
                  X
                  <input id="x" type="number" placeholder="Example: 123" />
                </label>
                <br />
                <label>
                  Z
                  <input id="z" type="number" placeholder="Example: -456" />
                </label>
              </div>

              <button
                class="btn btn-success border rounded-0"
                type="button"
                onclick="convertCoords()"
              >
                Convert
              </button>

              <div class="result-box mt-2 bg-dark" id="result">
                Result will appear here.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/js/skinview.js"></script>
    <script src="/js/background.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function convertCoords() {
        const xInput = document.getElementById("x");
        const zInput = document.getElementById("z");
        const direction = document.getElementById("direction").value;
        const result = document.getElementById("result");

        const x = Number(xInput.value);
        const z = Number(zInput.value);

        if (
          xInput.value === "" ||
          zInput.value === "" ||
          Number.isNaN(x) ||
          Number.isNaN(z) ||
          !Number.isInteger(x) ||
          !Number.isInteger(z)
        ) {
          result.textContent = "Enter valid integer X and Z coordinates.";
          return;
        }

        let convertedX;
        let convertedZ;
        let dimensionName;

        if (direction === "overworld-to-nether") {
          convertedX = Math.floor(x / 8);
          convertedZ = Math.floor(z / 8);
          dimensionName = "Nether";
        } else {
          convertedX = Math.floor(x * 8);
          convertedZ = Math.floor(z * 8);
          dimensionName = "Overworld";
        }

        result.innerHTML = `
        <strong>${dimensionName} coordinates:</strong><br>
        X: ${convertedX}<br>
        Z: ${convertedZ}
      `;
      }
    </script>
  </body>
</html>
