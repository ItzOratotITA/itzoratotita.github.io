<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oratot.com - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
	<link rel="stylesheet" href="index.css">
  </head>
  <style>
    #skin_container {
      width: 100%;
      max-width: 300px;
      height: 400px;
      display: block;
      margin: 0 auto;
    }
    body {
  margin: 0;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
  font-family: 'Minecraft Seven', sans-serif;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("https://www.oratot.com/louvre.avif");
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
  filter: blur(8px);
  transform: scale(1.05);
  z-index: -1;
}
  </style>
</head>
<body class="text-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
          <span class="navbar-brand mb-0 h1 text-primary">Oratot.com</span>
        </div>
    </nav>
    <p></p>

  <div class="container my-4">
    <div class="row">
      
      <div class="col-12 col-md-4">
        <div class="p-4 border bg-dark">
          <canvas id="skin_container"></canvas>
        </div>
      </div>

      <div class="col-12 col-md-8">
        <div class="p-4 border bg-dark">
          <h1>Heyah!</h1>
          My name is Oratot
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import * as skinview3d from "https://cdn.jsdelivr.net/npm/skinview3d@3.4.2/+esm";

    const skinViewer = new skinview3d.SkinViewer({
      canvas: document.getElementById("skin_container"),
      width: 300,
      height: 400,
      skin: "https://www.oratot.com/skin_definitiva.png",
      cape: "https://www.oratot.com/eye-blossom-cape.png"
    });

    skinViewer.controls.enableRotate = true;
    skinViewer.controls.enableZoom = true;
  </script>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
  </script>
</body>
</html>
