  <style>
body {
  margin: 0;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("https://www.oratot.com/louvre.jpeg");
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
  filter: blur(8px);
  transform: scale(1.05); /* avoids visible edges after blur */
  z-index: -1;
}
</style>
  <body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
          <span class="navbar-brand mb-0 h1">Oratot</span>
